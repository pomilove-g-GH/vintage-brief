app = "vintage-brief"
primary_region = "nrt"  # Tokyo — 한국 최저 레이턴시

[build]

[env]
  DATA_ROOT = "/data"
  PORT = "8080"
  FLASK_ENV = "production"

[[mounts]]
  source = "vintage_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
