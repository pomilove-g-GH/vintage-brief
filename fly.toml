# fly.toml app configuration file generated for vintage-brief on 2026-05-26T15:27:03+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vintage-brief'
primary_region = 'nrt'

[build]

[env]
  DATA_ROOT = '/data'
  FLASK_ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'vintage_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
